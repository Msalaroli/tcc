<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>TCC v3 · Stream</title>

    <style>
      body {
        font-family: system-ui, Arial, sans-serif;
        margin: 24px;
      }

      button {
        padding: 8px 12px;
        cursor: pointer;
      }

      #status {
        margin-top: 12px;
      }
    </style>
  </head>

  <body>
    <h1>Dev Overlay Stream</h1>

    <button id="start">Share Screen</button>

    <div id="status">Click on Share Screen to start.</div>

    <script>
      const startButton = document.getElementById('start');
      const statusEl = document.getElementById('status');

      let socket = null;
      let peerConnection = null;
      let desktopStream = null;
      let makingOffer = false;
      let pendingIceCandidates = [];

      function log(...args) {
        console.log('[stream]', ...args);
        statusEl.textContent = args.join(' ');
      }

      function createSocket() {
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const url = `${protocol}//${location.host}/dev-overlay-ws`;

        socket = new WebSocket(url);

        socket.addEventListener('open', () => {
          log('Signaling channel connected.');

          if (desktopStream) {
            createOffer();
          }
        });

        socket.addEventListener('message', async (event) => {
          const message = JSON.parse(event.data);

          if (!message || message.source === 'stream') {
            return;
          }

          console.log('[stream] received signal:', message.type, message.source);

          try {
            if (message.type === 'rtc:connect') {
              if (desktopStream) {
                log('Scene asked for reconnection. Recreating offer...');
                await createOffer();
              } else {
                log('Scene asked for connection. Click on Share Screen to start.');
              }
            }

            if (message.type === 'rtc:answer' && peerConnection) {
              await peerConnection.setRemoteDescription(
                new RTCSessionDescription(message.data)
              );

              if (pendingIceCandidates.length > 0) {
                for (const candidate of pendingIceCandidates) {
                  await peerConnection.addIceCandidate(candidate);
                }

                pendingIceCandidates = [];
              }

              log('Response received. Connecting...');
            }

            if (message.type === 'rtc:ice' && peerConnection) {
              const candidate = new RTCIceCandidate(message.data);

              if (peerConnection.remoteDescription) {
                await peerConnection.addIceCandidate(candidate);
              } else {
                pendingIceCandidates.push(candidate);
              }
            }
          } catch (error) {
            console.error('[stream] error WebRTC:', error);
            log('Erro WebRTC:', error.message);
          }
        });

        socket.addEventListener('close', () => {
          log('Signaling channel closed. Reconnecting...');

          setTimeout(() => {
            createSocket();
          }, 1000);
        });

        socket.addEventListener('error', (error) => {
          console.warn('[stream] websocket error:', error);
        });
      }

      function sendSignal(message) {
        if (!socket || socket.readyState !== WebSocket.OPEN) {
          console.warn('[stream] socket unavailable:', message.type);
          return;
        }

        socket.send(JSON.stringify(message));
      }

      function closePeerConnection() {
        if (peerConnection) {
          console.log('[stream] closing old connection');

          peerConnection.onicecandidate = null;
          peerConnection.onconnectionstatechange = null;
          peerConnection.close();
          peerConnection = null;
        }

        pendingIceCandidates = [];
      }

      function createPeerConnection() {
        closePeerConnection();

        peerConnection = new RTCPeerConnection();

        desktopStream.getTracks().forEach((track) => {
          peerConnection.addTrack(track, desktopStream);
        });

        peerConnection.onicecandidate = (event) => {
          if (event.candidate) {
            sendSignal({
              type: 'rtc:ice',
              source: 'stream',
              data: event.candidate
            });
          }
        };

        peerConnection.onconnectionstatechange = () => {
          console.log('[stream] connectionState:', peerConnection.connectionState);

          if (peerConnection.connectionState === 'connected') {
            log('WebRTC connection established.');
          }

          if (
            peerConnection.connectionState === 'failed' ||
            peerConnection.connectionState === 'disconnected'
          ) {
            log('WebRTC connection lost. Waiting for reconnection from the scene.');
          }
        };

        return peerConnection;
      }

      async function createOffer() {
        if (!desktopStream) {
          log('Click on Share Screen first.');
          return;
        }

        if (makingOffer) {
          console.log('[stream] offer already underway');
          return;
        }

        makingOffer = true;

        try {
          const pc = createPeerConnection();

          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);

          sendSignal({
            type: 'rtc:offer',
            source: 'stream',
            data: offer
          });

          log('Offer sent. Waiting for response from the scene.');
        } catch (error) {
          console.error('[stream] error creating offer:', error);
          log('Error creating offer:', error.message);
        } finally {
          makingOffer = false;
        }
      }

      async function startStream() {
        try {
          log('Requesting screenshot...');

          if (!desktopStream) {
            desktopStream = await navigator.mediaDevices.getDisplayMedia({
              video: {
                frameRate: 30
              },
              audio: false
            });

            desktopStream.getVideoTracks()[0]?.addEventListener('ended', () => {
              log('Screen sharing ended.');
              desktopStream = null;
              closePeerConnection();
            });
          }

          await createOffer();
        } catch (error) {
          console.error('[stream] error:', error);
          log('Error:', error.message);
        }
      }

      startButton.addEventListener('click', startStream);

      createSocket();
    </script>
  </body>
</html>
