<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>TCC v3 · Stream</title>
  </head>

  <body>
    <h1>Dev Overlay Stream</h1>

    <button id="start">Compartilhar tela</button>

    <div id="status">Aguardando inicio da transmissao.</div>

    <script type="module">
      const hot = import.meta.hot;
      const startButton = document.getElementById('start');
      const statusEl = document.getElementById('status');

      if (!startButton || !statusEl) {
        console.error('Botao #start ou div #status nao encontrados.');
        throw new Error('HTML incompleto: faltou #start ou #status');
      }

      let peerConnection = null;
      let desktopStream = null;

      function log(...args) {
        console.log('[stream]', ...args);
        statusEl.textContent = args.join(' ');
      }

      async function startStream() {
        try {
          if (!hot) {
            log('Erro: abra pelo Vite dev server.');
            return;
          }

          log('Solicitando captura de tela...');

          if (!desktopStream) {
            desktopStream = await navigator.mediaDevices.getDisplayMedia({
              video: true,
              audio: false
            });
          }

          peerConnection = new RTCPeerConnection();

          desktopStream.getTracks().forEach((track) => {
            peerConnection.addTrack(track, desktopStream);
          });

          peerConnection.onicecandidate = (event) => {
            if (event.candidate) {
              hot.send('dev-overlay:signal', {
                type: 'rtc:ice',
                source: 'stream',
                data: event.candidate
              });
            }
          };

          const offer = await peerConnection.createOffer();
          await peerConnection.setLocalDescription(offer);

          log('Enviando offer...');

          hot.send('dev-overlay:signal', {
            type: 'rtc:offer',
            source: 'stream',
            data: offer
          });
        } catch (error) {
          console.error('[stream] erro:', error);
          log('Erro:', error.message);
        }
      }

      hot?.on('dev-overlay:signal', async (message) => {
        if (!message || message.source === 'stream') return;

        log('Recebido:', message.type, 'de', message.source);

        try {
          if (message.type === 'rtc:answer' && peerConnection) {
            await peerConnection.setRemoteDescription(
              new RTCSessionDescription(message.data)
            );
            log('Conexao WebRTC estabelecida.');
          }

          if (message.type === 'rtc:ice' && peerConnection) {
            await peerConnection.addIceCandidate(
              new RTCIceCandidate(message.data)
            );
            log('ICE recebido.');
          }

          if (message.type === 'rtc:connect') {
            log('Cena pediu conexao. Clique em Compartilhar tela.');
          }
        } catch (error) {
          console.error('[stream] erro WebRTC:', error);
          log('Erro WebRTC:', error.message);
        }
      });

      startButton.addEventListener('click', startStream);
    </script>
  </body>
</html>
