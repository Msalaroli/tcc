<!-- Standalone editable shapes -->
<a-box
  id="house-body"
  position="-0.00 0.85 -0.70"
  width="0.20" height="0.20" depth="0.20"
  color="gray" material="roughness: 0.35; metalness: 0.08"
  animation="property: rotation; to: 0 360 0; loop: true; dur: 4500; easing: linear"
  >
</a-box>

<a-cone
  id="house-roof"
  position="0.40 1.03 -0.70"
  radius-bottom="0.16" radius-top="0" height="0.16"
  segments-radial="4" rotation="0 45 0"
  color="gray" material="roughness: 0.35; metalness: 0.08"
  animation="property: rotation; to: 0 405 0; loop: true; dur: 4500; easing: linear"
  >
</a-cone>

<!-- REFERENCE HOUSE -->
<a-box
  id="house-body-ref"
  position="-0.40 0.85 -0.70"
  width="0.20" height="0.20" depth="0.20"
  color="blue" material="roughness: 0.35; metalness: 0.08">
</a-box>

<a-cone
  id="house-roof-ref"
  position="-0.40 1.03 -0.70"
  radius-bottom="0.16" radius-top="0" height="0.16"
  segments-radial="4" rotation="0 45 0"
  color="orange" material="roughness: 0.35; metalness: 0.08">
</a-cone>


<!-- Lower work area. This disappears when the overlay is active. -->
<a-plane
  class="dev-overlay-hide-when-active"
  rotation="-90 0 0"
  width="2.4"
  height="1.1"
  color="#16A34A"
  opacity="0.72"
  position="0 0.718 -0.75">
</a-plane>

<a-text
  class="dev-overlay-hide-when-active"
  value="This plane hides the keyboard!"
  align="center"
  color="#FFFFFF"
  position="0 0.75 -0.4"
  rotation="-90 0 0"
  width="1.2">
</a-text>

<!-- Main title -->
